<!DOCTYPE html>
<html>

<head>

<title>SKP - SiPARJO</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.header{
background:#1a73e8;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.status{
padding:10px;
border-radius:5px;
display:inline-block;
font-weight:bold;
color:white;
}

.valid{
background:green;
}

.revisi-status{
background:#d9534f;
}

.menunggu{
background:orange;
}

.revisi{
background:#ffe5e5;
padding:15px;
border-radius:5px;
margin-top:15px;
}

iframe{
width:100%;
height:700px;
border:none;
margin-top:20px;
}

.back{
color:white;
text-decoration:none;
float:right;
font-size:14px;
background:red;
padding:8px 15px;
border-radius:5px;
}

button{
background:#1a73e8;
color:white;
border:none;
padding:10px 20px;
cursor:pointer;
border-radius:5px;
}

input[type=file]{
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">

SKP - SiPARJO

<a href="dashboard.html" class="back">
Kembali
</a>

</div>

<div class="container">

<div class="card">

<h2>Status Dokumen SKP</h2>

<div id="status"></div>

<div id="revisi"></div>

<div id="uploadArea"></div>

</div>

<div class="card">

<h2>Preview SKP</h2>

<div id="preview"></div>

</div>

</div>

<script>

var nip =
localStorage.getItem("nip");

if(!nip){

window.location.href =
"login.html";

}

loadSKP();

async function loadSKP(){

var response = await fetch(
"https://script.google.com/macros/s/AKfycbwJ-pezwlXRFcpVvEb_ACLlW1wQHXQrJPHTETYg3dNiwN0hFJIR2p1mSGNJlAuP3GStpg/exec?action=skp&nip=" + nip
);

var data = await response.json();

if(data.success){

var statusClass = "menunggu";

if(data.status.toLowerCase() == "Valid"){
statusClass = "valid";
}

if(data.status.toLowerCase() == "Revisi"){
statusClass = "revisi-status";
}

document.getElementById("status").innerHTML =

"<div class='status " + statusClass + "'>" +
data.status +
"</div>";


// ======================
// STATUS REVISI
// ======================

if(data.status.toLowerCase() == "revisi"){

document.getElementById("revisi").innerHTML =

"<div class='revisi'>" +

"<b>Catatan Revisi:</b><br>" +

data.revisi +

"</div>";

document.getElementById("uploadArea").innerHTML =

"<br><h3>Upload Revisi SKP</h3>" +

"<input type='file' id='fileRevisi'>" +

"<br><br>" +

"<button onclick='uploadRevisi()'>Upload Revisi</button>";

}else{

document.getElementById("revisi").innerHTML = "";
document.getElementById("uploadArea").innerHTML = "";

}


// ======================
// PREVIEW PDF
// ======================

document.getElementById("preview").innerHTML =

"<iframe src='https://drive.google.com/file/d/" +

data.file_skp +

"/preview'></iframe>";

}else{

document.getElementById("preview").innerHTML =

"Data SKP belum tersedia";

}

}


// ======================
// DUMMY UPLOAD
// ======================

async function uploadRevisi(){

var fileInput =
document.getElementById("fileRevisi");

if(fileInput.files.length == 0){

alert("Pilih file terlebih dahulu");

return;

}

var file = fileInput.files[0];

var reader = new FileReader();

reader.onload = async function(){

var base64 =
reader.result.split(",")[1];

var formData =
new URLSearchParams();

formData.append(
"action",
"uploadRevisiSKP"
);

formData.append(
"nip",
nip
);

formData.append(
"file",
base64
);

formData.append(
"fileName",
file.name
);

document.getElementById("uploadArea").innerHTML =
"Uploading...";

var response = await fetch(
"https://script.google.com/macros/s/AKfycbwJ-pezwlXRFcpVvEb_ACLlW1wQHXQrJPHTETYg3dNiwN0hFJIR2p1mSGNJlAuP3GStpg/exec",
{
method:"POST",
body:formData
}
);

var result =
await response.json();

if(result.success){

alert("Upload revisi berhasil");

location.reload();

}else{

alert("Upload gagal");

}

};

reader.readAsDataURL(file);

}

</script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

<title>SKP - SiPARJO</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
}

.header{
background:#1a73e8;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.status{
padding:10px;
border-radius:5px;
display:inline-block;
font-weight:bold;
}

.revisi{
background:#ffe5e5;
padding:15px;
border-radius:5px;
margin-top:10px;
}

iframe{
width:100%;
height:700px;
border:none;
margin-top:20px;
}

.back{
color:white;
text-decoration:none;
float:right;
font-size:14px;
background:red;
padding:8px 15px;
border-radius:5px;
}

</style>

</head>

<body>

<div class="header">

SKP - SiPARJO

<a href="dashboard.html" class="back">
Kembali
</a>

</div>

<div class="container">

<div class="card">

<h2>Status Dokumen SKP</h2>

<div id="status"></div>

<div id="revisi"></div>

</div>

<div class="card">

<h2>Preview SKP</h2>

<div id="preview"></div>

</div>

</div>

<script>

var nip =
localStorage.getItem("nip");

if(!nip){

window.location.href =
"login.html";

}

loadSKP();

async function loadSKP(){

var response = await fetch(
"https://script.google.com/macros/s/AKfycbwG2C3CVO47gjy2-wH6zfEsePXavzUSePD_okSltLZqfo7i1M1xq_nukCHEh6owNZzlpA/exec?action=skp&nip=" + nip
);

var data = await response.json();

if(data.success){

document.getElementById("status").innerHTML =
"<div class='status'>" +
data.status +
"</div>";

document.getElementById("revisi").innerHTML =
"<div class='revisi'>" +
"<b>Catatan Revisi:</b><br>" +
data.revisi +
"</div>";

document.getElementById("preview").innerHTML =
"<iframe src='https://drive.google.com/file/d/" +
data.file_skp +
"/preview'></iframe>";

}else{

document.getElementById("preview").innerHTML =
"Data SKP belum tersedia";

}

}

</script>

</body>

</html>
